<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title></title>
</head>
<body style="margin:0;overflow:hidden;overflow-x:hidden;overflow-y:hidden;background-color: #FFF;">
<script type="text/javascript" src="cordova.js"></script>
<script type="text/javascript">
    window.serverUrl = "wss://mj.235301.xyz/ws/g";
    window.gameInit = function (obj, initCallback) {
        window.$initCallback = initCallback.bind(obj);
    };
</script>
<script src="myLaya.min.js" loader="laya"></script>
<script>
    document.addEventListener("deviceready", onDeviceReady, false);
    function onDeviceReady() {
        // 隐藏启动画面
        try {
            if (navigator.splashscreen && navigator.splashscreen.hide) {
                navigator.splashscreen.hide();
            }
        } catch(e) {
            console.log("splashscreen hide error:", e);
        }

        // 初始化微信分享（如果插件可用）
        (function () {
            var Wechat = null;
            try {
                Wechat = cordova.require("cordova-plugin-wechat.Wechat");
            } catch(e) {
                console.log("Wechat plugin not available, skipping:", e);
            }

            var clientAddress = "https://mj.235301.xyz/";

            if (Wechat) {
                window.shareInviteUser = function (roomId) {
                    Wechat.isInstalled(function (installed) {
                        var params = {
                            scene: Wechat.Scene.SESSION
                        };
                        params.message = {
                            mediaTagName: "S-TAG-001",
                            messageExt: "",
                            messageAction: "<action>dotalist</action>",
                            media: {}
                        };
                        params.message.title = '房间:' + roomId + "",
                            params.message.description = "邀请你进行一局麻将";
                        params.message.thumb = "www/icon/180.png";
                        params.message.media.type = Wechat.Type.LINK;
                        params.message.media.webpageUrl = clientAddress + "?roomId=" + roomId;

                        Wechat.share(params, function () {
                            alert("邀请发送成功");
                        }, function (reason) {
                            alert("邀请发送失败：" + reason);
                        });
                    }, function (reason) {
                        alert("未安装微信");
                    });
                };

                window.weixinLogin = function (callback) {
                    Wechat.isInstalled(function (installed) {
                        var scope = "snsapi_userinfo", state = "_" + (+new Date());
                        Wechat.auth(scope, state, function (response) {
                            var url = clientAddress + "appWeixinLogin.json";
                            var httpRequest = new XMLHttpRequest();
                            httpRequest.onreadystatechange = alertContents;
                            httpRequest.open('POST', url);
                            httpRequest.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
                            console.log('weiXinJson', response);
                            httpRequest.send("data=" + encodeURIComponent(JSON.stringify(response)));
                            function alertContents() {
                                if (httpRequest.readyState === XMLHttpRequest.DONE) {
                                    if (httpRequest.status === 200) {
                                        var json = JSON.parse(httpRequest.responseText);
                                        console.log("微信登录结果:", httpRequest.responseText);
                                        if (json.msg) {
                                            callback();
                                            console.log("微信登错误:", httpRequest);
                                            alert(json.msg);
                                        } else {
                                            callback(json.data);
                                        }
                                    } else {
                                        callback();
                                        console.log("微信登错误:", httpRequest);
                                        alert("微信登录错误: 服务器状态码" + httpRequest.status);
                                    }
                                }
                            }
                        }, function (reason) {
                            alert("微信登录错误: " + reason);
                            callback();
                        });
                    }, function (reason) {
                        alert("未安装微信");
                        callback();
                    });
                };
            } else {
                // 微信插件不可用时的占位
                window.shareInviteUser = function(roomId) {
                    alert("请手动复制房间号 " + roomId + " 邀请好友");
                };
                window.weixinLogin = function(callback) {
                    callback();
                };
            }

            // 启动游戏
            if (window.$initCallback) {
                window.$initCallback();
            }
        })();
    }
</script>
</body>
</html>
