name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        continue-on-error: true
        run: |
          set +e
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          cordova platform add android@10 2>&1
          cordova build android --debug 2>&1

      - name: Find and upload APK
        working-directory: ./client/cordova
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>&1
          echo "=== Build outputs ==="
          find platforms/android/app/build/outputs -type f 2>&1 || echo "no outputs dir"