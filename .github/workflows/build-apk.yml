name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK env vars
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "=== Pre-installed ==="
          ls $SDK/build-tools/
          echo "---"
          ls $SDK/platforms/
          echo "---"
          java -version 2>&1

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build (don't fail)
        working-directory: ./client/cordova
        run: |
          set +e
          echo "=== ENV ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/
          ls platforms/android/app/ 2>/dev/null
          echo "=== RUN ==="
          cordova build android --debug 2>&1
          echo "=== EXIT CODE: $? ==="
        continue-on-error: true

      - name: Check cordova output
        working-directory: ./client/cordova
        run: |
          echo "=== last lines ==="
          cordova build android --debug 2>&1 | tail -5
          echo "---"
          ls platforms/android/app/build/outputs/ 2>/dev/null || echo "no outputs"
          find . -name "*.apk" 2>/dev/null || echo "no apks"