name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build
        working-directory: ./client/cordova
        run: |
          LOG=$GITHUB_WORKSPACE/build-log.txt
          exec > >(tee -a "$LOG") 2>&1
          set +e
          rm -rf platforms/android/ platforms/platforms.json
          echo "=== PLATFORM ADD ==="
          cordova platform add android@10 2>&1
          echo "PLATFORM_ADD_EXIT=$?"
          ls -la platforms/android/ 2>/dev/null | head -5
          ls -la platforms/android/gradle/wrapper/ 2>/dev/null | head -5
          ls -la platforms/android/gradlew 2>/dev/null
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-7.1.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.0.4';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" 2>/dev/null
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "BUILD_EXIT=$?"
          echo "=== APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          find platforms -type d -name outputs 2>/dev/null
          echo "=== GRADLEW ==="
          if [ -x platforms/android/gradlew ]; then
            cd platforms/android && ./gradlew assembleDebug --info 2>&1
            echo "DIRECT_EXIT=$?"
            find . -name "*.apk" -type f 2>/dev/null
          else
            ls -la platforms/android/ 2>/dev/null
            echo "No gradlew found"
          fi
          echo "=== DONE ==="

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/**/*.apk