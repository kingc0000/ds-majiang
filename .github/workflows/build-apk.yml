name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV && echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Platform add android@10
        working-directory: ./client/cordova
        run: rm -rf platforms && cordova platform add android@10 && ls platforms/android/
      - name: Set AGP 7.3.1 SDK 33
        working-directory: ./client/cordova
        run: |
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
          echo "=== cdv-gradle-config.json ==="
          cat platforms/android/cdv-gradle-config.json
          echo "=== gradle-wrapper.properties ==="
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "NO WRAPPER PROPS"
          echo "=== gradlew ==="
          ls -la platforms/android/gradlew
          ls -la platforms/android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo "NO WRAPPER JAR"
      - name: Build with cordova
        working-directory: ./client/cordova
        run: |
          echo "=== Cordova version ==="
          cordova --version
          echo "=== Cordova requirements ==="
          cordova requirements android 2>&1 || echo "requirements not available"
          echo "=== Building ==="
          cordova build android --verbose 2>&1
          echo "=== Build exit: $? ==="
      - name: Find APK
        if: always()
        working-directory: ./client/cordova
        run: |
          echo "=== All APK files ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20
          echo "=== App build outputs ==="
          find platforms -type d -name "outputs" 2>/dev/null || echo "No outputs dir"
          echo "=== app structure ==="
          find platforms/android -type d -name "apk" 2>/dev/null || echo "No apk dir"
          echo "=== android build dirs ==="
          find platforms/android -type d -name "build" 2>/dev/null | head -10
      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            client/cordova/platforms/android/build/**/*.txt
            client/cordova/platforms/android/build/**/*.log