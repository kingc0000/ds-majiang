name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Debug - check environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "No build-tools dir"
          echo "--- SDK platforms ---"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV && echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Debug - Cordova and SDK check
        run: |
          echo "Node: $(node -v)"
          echo "Cordova: $(cordova -v)"
          echo "SDK platforms:"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null
          echo "SDK build-tools:"
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null
      - name: Platform add android@10
        working-directory: ./client/cordova
        run: rm -rf platforms && cordova platform add android@10 2>&1
      - name: Configure Gradle settings
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['AGP_VERSION']='7.3.1';c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='30.0.3';c['BUILD_TOOLS_VERSION']='34.0.0';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
      - name: Set Gradle 7.6.3 wrapper
        working-directory: ./client/cordova/platforms/android
        run: echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" > gradle/wrapper/gradle-wrapper.properties
      - name: Debug - check config files
        run: |
          cat client/cordova/platforms/android/cdv-gradle-config.json
          echo "---gradle wrapper---"
          cat client/cordova/platforms/android/gradle/wrapper/gradle-wrapper.properties
      - name: Build APK
        working-directory: ./client/cordova/platforms/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee $GITHUB_WORKSPACE/build-log.txt
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            **/*.apk
            app/build/outputs/**/*.apk