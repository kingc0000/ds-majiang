name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build
        working-directory: ./client/cordova
        run: |
          exec 2>&1
          set +e
          rm -rf platforms/android/ platforms/platforms.json
          echo "STEP1: platform add"
          cordova platform add android@10
          echo "PLATFORM_EXIT=$?"
          echo "STEP2: build"
          cordova build android --debug
          echo "BUILD_EXIT=$?"
          echo "STEP3: find apk"
          find . -name "*apk" -type f -o -name "*aab" -type f
          echo "STEP4: outputs dir"
          ls -la platforms/android/app/build/outputs/ 2>/dev/null
          ls -la platforms/android/app/build/outputs/apk/ 2>/dev/null
          ls -la platforms/android/build/outputs/ 2>/dev/null
          echo "DONE"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/**/*.apk