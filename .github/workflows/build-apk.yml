name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          LOG=$GITHUB_WORKSPACE/build.log
          set -e
          exec 2>&1
          echo "=== JAVA ==="
          java -version 2>&1
          echo "JAVA_HOME=$JAVA_HOME"
          echo "=== CLEAN ==="
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          echo "=== ADD PLATFORM ==="
          cordova platform add android@10 2>&1
          echo "=== FIX ==="
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-7.1.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties
          python3 -c "import json; c=json.load(open('platforms/android/cdv-gradle-config.json')); c['SDK_VERSION']='33'; c['MIN_BUILD_TOOLS_VERSION']='33.0.1'; json.dump(c, open('platforms/android/cdv-gradle-config.json','w'), indent=4)"
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "=== APK ==="
          find . -name "*.apk" -type f
        continue-on-error: true

      - name: Show outputs
        working-directory: ./client/cordova
        run: |
          echo "=== BUILD DIRS ==="
          find platforms/android/app/build -type d 2>&1 | head -20 || echo "no build dir"
          echo "=== BUILD FILES ==="
          find platforms/android/app/build -type f 2>&1 | head -20 || echo "no files"
          echo "=== APK SEARCH ==="
          find . -type f -name "*.apk" 2>&1 || echo "no apk"
          echo "=== GRADLE WRAPPER ==="
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties 2>&1 || echo "no wrapper"
          echo "=== CDV CONFIG ==="
          cat platforms/android/cdv-gradle-config.json 2>&1 || echo "no config"

      - name: Upload APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/app/build/**/*.apk
            client/cordova/platforms/android/**/*.apk