name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV && echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Platform add
        working-directory: ./client/cordova
        run: rm -rf platforms/android platforms/platforms.json && cordova platform add android@10

      - name: Download gradlew
        working-directory: ./client/cordova
        run: |
          mkdir -p platforms/android/gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradlew" -o platforms/android/gradlew
          chmod +x platforms/android/gradlew
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o platforms/android/gradle/wrapper/gradle-wrapper.jar

      - name: Create gradle wrapper
        working-directory: ./client/cordova
        run: |
          echo "=== CREATE WRAPPER PROPERTIES ==="
          cat > platforms/android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties

      - name: Fix AGP version
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"

      - name: Assemble debug
        working-directory: ./client/cordova
        run: |
          cd platforms/android && ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee $GITHUB_WORKSPACE/gradle-log.txt
          echo "GRADLE_EXIT=${PIPESTATUS[0]}"

      - name: Find APK
        if: always()
        working-directory: ./client/cordova
        run: |
          echo "=== BUILD DIR ==="
          find platforms/android/app/build -maxdepth 5 -type d 2>/dev/null || true
          echo "=== INTERMEDIATES ==="
          ls -la platforms/android/app/build/intermediates/apk/ 2>/dev/null || true
          echo "=== OUTPUTS ==="
          ls -la platforms/android/app/build/outputs/ 2>/dev/null || true
          ls -la platforms/android/app/build/outputs/apk/ 2>/dev/null || true
          echo "=== ALL APK ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "=== APP BUILD ==="
          ls -la platforms/android/app/build/ 2>/dev/null || true
          # Copy APK if found
          APK_FILE=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "$GITHUB_WORKSPACE/app.apk"
            echo "COPIED: $APK_FILE"
          fi

      - name: Upload gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: gradle-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: /home/runner/work/ds-majiang/ds-majiang/*.apk
          if-no-files-found: warn