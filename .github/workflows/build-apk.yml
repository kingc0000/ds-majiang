name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build
        working-directory: ./client/cordova
        run: |
          exec 2>&1
          set +e
          # Clean and add platform
          rm -rf platforms/android/ platforms/platforms.json
          echo "=== PLATFORM ADD ==="
          cordova platform add android@10 2>&1
          echo "PLATFORM_ADD_EXIT=$?"
          # Check what was created
          echo "=== DIR CHECK ==="
          ls -la platforms/android/ 2>/dev/null | head -5
          ls -la platforms/android/gradle/wrapper/ 2>/dev/null | head -5
          ls -la platforms/android/gradlew 2>/dev/null
          # Fix wrapper version
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-7.1.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null
          # Fix SDK config
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.0.4';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" 2>/dev/null
          # Build
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "BUILD_EXIT=$?"
          # Find APK
          echo "=== FIND APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          find platforms -type d -name outputs -exec ls -R {} \; 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/**/*.apk