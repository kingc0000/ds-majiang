name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK and build-tools
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "=== Current SDK ==="
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          echo "=== Installing build-tools 33.0.0 ==="
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-33" 2>&1 || true
          echo "=== After install ==="
          ls $ANDROID_HOME/build-tools/
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Platform add android@10
        working-directory: ./client/cordova
        run: rm -rf platforms && cordova platform add android@10
      - name: Set AGP 7.3.1 SDK 33
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.0';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
      - name: Build with gradlew
        working-directory: ./client/cordova/platforms/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1