name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          set -e
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          echo "=== JAVA ==="
          java -version 2>&1
          echo "=== SDK ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/
          ls $ANDROID_SDK_ROOT/platforms/
          echo "=== ADD PLATFORM ==="
          cordova platform add android@10 2>&1
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "=== FIND APK ==="
          find . -name "*.apk" -type f

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: client/cordova/platforms/android/cdv-gradle-config.json