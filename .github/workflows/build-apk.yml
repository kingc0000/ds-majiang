name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          java -version 2>&1
          ls $SDK/build-tools/
          ls $SDK/platforms/

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        id: build
        working-directory: ./client/cordova
        run: |
          set -e
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          cordova platform add android@10 2>&1 | tee $HOME/platform-log.txt
          echo "--- platform add done ---"
          ls -la platforms/android/cdv-gradle-config.json
          cat platforms/android/cdv-gradle-config.json
          cordova build android --debug 2>&1 | tee -a $HOME/platform-log.txt
          echo "--- build done ---"
          find . -name "*.apk" -type f

      - name: Upload log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /root/platform-log.txt