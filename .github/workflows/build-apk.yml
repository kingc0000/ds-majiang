name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Test Java
        run: java -version

      - name: Test Cordova
        run: cordova --version

      - name: Test platform add
        working-directory: ./client/cordova
        run: |
          rm -rf platforms/android/ platforms/platforms.json
          cordova platform add android@10

      - name: Generate Gradle wrapper
        working-directory: ./client/cordova/platforms/android
        run: |
          echo "=== CHECK ==="
          ls -la gradlew 2>&1 || echo "no gradlew"
          which gradle 2>&1 || echo "no gradle in PATH"
          # Find system gradle
          for g in /usr/share/gradle*/bin/gradle; do
            if [ -x "$g" ]; then
              echo "Found system Gradle: $g"
              "$g" wrapper --gradle-version 7.1.1 2>&1
              break
            fi
          done
          echo "=== AFTER ==="
          ls -la gradlew gradle/wrapper/ 2>&1
          head -3 gradle/wrapper/gradle-wrapper.properties 2>&1

      - name: Fix SDK config
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.0.4';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" && cat platforms/android/cdv-gradle-config.json

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          exec 2>&1
          echo "=== BUILD.GRADLE ==="
          head -30 platforms/android/app/build.gradle || echo "no app/build.gradle"
          echo "=== ROOT BUILD.GRADLE ==="
          head -20 platforms/android/build.gradle || echo "no build.gradle"
          echo "=== REQUIREMENTS ==="
          cordova requirements android || true
          echo "=== BUILD ==="
          cd platforms/android && ./gradlew assembleDebug --info; EC=$?
          echo "GRADLE_EXIT_CODE=${EC}"
          echo "=== APK ==="
          find . -name "*.apk" -type f || echo "no apk found"
          find . -type d -name "outputs" -exec ls -la {} \; 2>/dev/null || echo "no outputs dirs"

      - name: Find APK
        working-directory: ./client/cordova
        continue-on-error: true
        run: |
          echo "=== SEARCH APK ===" | tee -a $GITHUB_WORKSPACE/build-log.txt
          find . -type f -name "*.apk" 2>&1 | tee -a $GITHUB_WORKSPACE/build-log.txt
          echo "=== BUILD DIRS ===" | tee -a $GITHUB_WORKSPACE/build-log.txt
          ls -la platforms/android/app/build/outputs/ 2>&1 | tee -a $GITHUB_WORKSPACE/build-log.txt
          find platforms/android/app/build -type d 2>&1 | head -20 | tee -a $GITHUB_WORKSPACE/build-log.txt
          echo "=== BUILD FILES ===" | tee -a $GITHUB_WORKSPACE/build-log.txt
          find platforms/android/app/build -type f 2>&1 | head -20 | tee -a $GITHUB_WORKSPACE/build-log.txt
          echo "=== GRADLE WRAPPER ===" | tee -a $GITHUB_WORKSPACE/build-log.txt
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties 2>&1 | tee -a $GITHUB_WORKSPACE/build-log.txt
          echo "=== DONE ===" | tee -a $GITHUB_WORKSPACE/build-log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: client/cordova/platforms/android/app/build/outputs/**/*.apk