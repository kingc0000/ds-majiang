name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          set -e
          rm -rf platforms/android/ platforms/platforms.json
          echo 'STEP: cordova platform add android@10'
          cordova platform add android@10
          echo 'STEP: fix wrapper'
          sed -i 's|gradle-[0-9.]*bin.zip|gradle-7.1.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo 'STEP: fix config'
          python3 -c "import json; c=json.load(open('platforms/android/cdv-gradle-config.json')); c['SDK_VERSION']='33'; c['MIN_BUILD_TOOLS_VERSION']='33.0.1'; c['AGP_VERSION']='7.0.4'; json.dump(c, open('platforms/android/cdv-gradle-config.json','w'), indent=4)"
          echo 'STEP: build'
          cordova build android --debug
          echo 'STEP: find apk'
          find . -type f -name "*.apk"

      - name: Upload build log
        if: failure()
        run: echo "Build failed, check annotations"