name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV && echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Platform add
        working-directory: ./client/cordova
        run: rm -rf platforms/android platforms/platforms.json && cordova platform add android@10

      - name: Setup wrapper and build
        working-directory: ./client/cordova
        run: |
          mkdir -p platforms/android/gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradlew" -o platforms/android/gradlew
          chmod +x platforms/android/gradlew
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o platforms/android/gradle/wrapper/gradle-wrapper.jar
          echo "distributionBase=GRADLE_USER_HOME" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-bin.zip" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> platforms/android/gradle/wrapper/gradle-wrapper.properties
          cd platforms/android
          python3 -c "import json;c=json.load(open('cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('cdv-gradle-config.json','w'),indent=4)"
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1
          echo "GRADLE_EXIT=$?"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: home/runner/work/ds-majiang/ds-majiang/client/cordova/platforms/android/app/build/outputs/**/*.apk
          if-no-files-found: warn