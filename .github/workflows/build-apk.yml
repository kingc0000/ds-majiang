name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Test Java
        run: java -version

      - name: Test Cordova
        run: cordova --version

      - name: Test platform add
        working-directory: ./client/cordova
        run: |
          rm -rf platforms/android/ platforms/platforms.json
          cordova platform add android@10

      - name: Fix Gradle wrapper
        working-directory: ./client/cordova
        run: |
          ls -la platforms/android/gradle/wrapper/ 2>&1 || echo "NO wrapper dir"
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties 2>&1 || echo "NO properties file"
          echo "=== fixing ==="
          perl -pe 's|gradle-[0-9.]+-bin.zip|gradle-7.1.1-bin.zip|g' -i platforms/android/gradle/wrapper/gradle-wrapper.properties 2>&1 || true
          head -5 platforms/android/gradle/wrapper/gradle-wrapper.properties 2>&1 || true

      - name: Fix SDK config
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.0.4';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" && cat platforms/android/cdv-gradle-config.json

      - name: Build APK
        working-directory: ./client/cordova
        continue-on-error: true
        run: cordova build android --debug 2>&1 | tee $GITHUB_WORKSPACE/build-log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Find APK
        working-directory: ./client/cordova
        run: find . -type f -name "*.apk"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: client/cordova/platforms/android/app/build/outputs/**/*.apk