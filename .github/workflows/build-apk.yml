name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK & Build Tools
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "=== Checking existing SDK ==="
          ls $SDK/build-tools/ 2>/dev/null || echo "No build-tools found"
          ls $SDK/platforms/android-30/ 2>/dev/null || echo "android-30 not found"
          echo "=== Java version ==="
          java -version 2>&1 || echo "No Java found"
          echo "=== Sdkmanager ==="
          ls $SDK/cmdline-tools/latest/bin/sdkmanager 2>/dev/null || echo "sdkmanager not found"
          echo "=== Accepting licenses ==="
          mkdir -p $SDK/licenses 2>/dev/null || true
          for lic in "8933bad161af4178b1185d1a37fbf41ea5269c55" "d56f5187479451eabf01fb78af6dfcb131a6481e" "24333f8a63b6825ea9c5514f83c2829b004d1fee"; do
            echo $lic >> $SDK/licenses/android-sdk-license 2>/dev/null || true
          done
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license 2>/dev/null || true
          echo "=== Installing build-tools 30.0.3 ==="
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;30.0.3" \
            "platforms;android-30" \
            --sdk_root=$SDK 2>&1 || echo "SDKMANAGER FAILED"
          echo "=== Final SDK state ==="
          ls $SDK/build-tools/ 2>/dev/null
          ls $SDK/platforms/android-30/ 2>/dev/null || echo "android-30 still not found"

      - name: Install Cordova
        run: |
          npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo "=== ANDROID_SDK_ROOT ==="
          echo $ANDROID_SDK_ROOT
          echo "=== Starting cordova build ==="
          cordova build android --debug 2>&1 | tee build-log.txt
          echo "=== Exit code: $? ==="

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ./client/cordova/build-log.txt
          retention-days: 7

      - name: Sign APK
        working-directory: ./client/cordova
        run: |
          echo "=== Searching for APK ==="
          find platforms/android -name "*.apk" 2>/dev/null
          # Try debug first (current build type), then release-unsigned, then any
          APK=$(find platforms/android -name "*debug.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find platforms/android -name "*-release-unsigned.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find platforms/android -name "*.apk" 2>/dev/null | head -1)
          fi
          echo "APK path: $APK"
          
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "No APK found!"
            exit 1
          fi
          
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-key.keystore 2>/dev/null || true
          if [ -f release-key.keystore ]; then
            echo "=== Signing APK ==="
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore release-key.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" \
              "${{ secrets.KEY_ALIAS }}"
            
            echo "=== Zipalign ==="
            ZIPALIGN=$(ls ${ANDROID_HOME}/build-tools/*/zipalign 2>/dev/null | head -1)
            echo "Using zipalign: $ZIPALIGN"
            $ZIPALIGN -v 4 "$APK" MajiangGame.apk
            ls -la MajiangGame.apk
          else
            echo "=== No keystore, copying unsigned APK ==="
            cp "$APK" MajiangGame.apk
            ls -la MajiangGame.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: |
            ./client/cordova/MajiangGame.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./client/cordova/MajiangGame.apk
          generate_release_notes: true