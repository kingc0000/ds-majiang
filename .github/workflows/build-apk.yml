name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "=== Available build-tools ==="
          ls /usr/local/lib/android/sdk/build-tools/
          echo "=== Available platforms ==="
          ls /usr/local/lib/android/sdk/platforms/
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Setup platform
        working-directory: ./client/cordova
        run: |
          rm -rf platforms
          cordova platform add android@10 2>&1 | tail -5
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['AGP_VERSION']='7.3.1';c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='30.0.3';c['BUILD_TOOLS_VERSION']='34.0.0';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
          echo "=== Config check ==="
          cat platforms/android/cdv-gradle-config.json
      - name: Download Gradle 7.5.1
        run: |
          curl -sL -o /tmp/gradle-7.5.1-bin.zip "https://services.gradle.org/distributions/gradle-7.5.1-bin.zip"
          unzip -q /tmp/gradle-7.5.1-bin.zip -d /opt
          echo "/opt/gradle-7.5.1/bin" >> $GITHUB_PATH
      - name: Build APK
        working-directory: ./client/cordova/platforms/android
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee $GITHUB_WORKSPACE/build-log.txt
      - name: Report build error
        if: failure()
        run: |
          if [ -s build-log.txt ]; then
            tail -30 build-log.txt | while IFS= read -r line; do
              echo "::error::gradle: $line"
            done
          else
            echo "::error::build-log.txt not found or empty"
          fi