name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV && echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Platform add android@10
        working-directory: ./client/cordova
        run: rm -rf platforms && cordova platform add android@10
      - name: Set AGP 7.3.1 SDK 33
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
      - name: Setup Gradle 7.5.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "7.5.1"
      - name: Build APK
        working-directory: ./client/cordova/platforms/android
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-log.txt
          exit ${PIPESTATUS[0]}
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build-log.txt
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            **/*.apk
            app/build/outputs/**/*.apk