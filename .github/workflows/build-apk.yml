name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Debug - check environment
        run: |
          java -version 2>&1
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "No build-tools"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "No platforms"
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Setup platform and config
        working-directory: ./client/cordova
        run: |
          rm -rf platforms
          cordova platform add android@10 2>&1
          echo "=== Configuring Gradle ==="
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['AGP_VERSION']='7.3.1';c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='30.0.3';c['BUILD_TOOLS_VERSION']='34.0.0';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
          echo "=== Checking wrapper dir ==="
          ls -la platforms/android/gradle/wrapper/ 2>/dev/null
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.3-all.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "=== Wrapper config ==="
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "=== CDV config ==="
          cat platforms/android/cdv-gradle-config.json
      - name: Build APK
        working-directory: ./client/cordova/platforms/android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-log.txt
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: client/cordova/platforms/android/build-log.txt
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/**/*.apk
            app/build/outputs/**/*.apk