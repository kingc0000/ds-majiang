name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        continue-on-error: true
        run: |
          set +e
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          echo "=== ADD PLATFORM ==="
          cordova platform add android@10 2>&1
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "=== EXIT CODE: $? ==="

      - name: Show outputs
        working-directory: ./client/cordova
        run: |
          echo "=== GRADLE CONFIG ==="
          cat platforms/android/cdv-gradle-config.json 2>&1 || echo "no gradle config"
          echo "=== BUILD OUTPUTS ==="
          find platforms/android/app/build -name "*.apk" 2>&1 || echo "no APKs"
          find platforms/android/app/build -name "*.txt" 2>&1 || echo "no txt"
          echo "=== BUILD LOGS ==="
          find platforms/android/app/build/outputs/logs/ -type f 2>&1 || echo "no build logs"
          ls -la platforms/android/app/build/outputs/ 2>&1 || echo "no outputs"