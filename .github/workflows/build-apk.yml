name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK env vars
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "=== Pre-installed ==="
          ls $SDK/build-tools/
          echo "---"
          ls $SDK/platforms/
          echo "---"
          java -version 2>&1

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        shell: bash
        run: |
          set -e
          echo "=== ENV CHECK ==="
          java -version 2>&1
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/
          ls $ANDROID_SDK_ROOT/platforms/
          echo "=== INSTALL CORDOVA ==="
          npm install -g cordova@13 2>&1
          echo "=== CLEAN PLATFORM ==="
          rm -rf platforms/android/
          echo "=== ADD PLATFORM ==="
          cordova platform add android@10 2>&1
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "=== DONE ==="
          find . -name "*.apk"