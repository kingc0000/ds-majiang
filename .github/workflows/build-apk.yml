name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build
        working-directory: ./client/cordova
        run: |
          exec 2>&1
          set +e
          set +o pipefail
          rm -rf platforms/android/ platforms/platforms.json
          cordova platform add android@10
          echo "PEXIT=$?"
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-7.1.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.0.4';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" 2>/dev/null
          cordova build android --debug
          echo "BEXIT=$?"
          find platforms -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
          find platforms -type d -name outputs 2>/dev/null
          # Save build info to be read later
          mkdir -p /tmp/build-info
          find platforms -type f -maxdepth 8 > /tmp/build-info/files.txt 2>/dev/null
          find platforms -type d -maxdepth 8 > /tmp/build-info/dirs.txt 2>/dev/null
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties > /tmp/build-info/gradle-wrapper.properties 2>/dev/null
          cat platforms/android/cdv-gradle-config.json > /tmp/build-info/cdv-config.json 2>/dev/null
          head -100 platforms/android/app/build.gradle > /tmp/build-info/app-build.gradle 2>/dev/null
          head -50 platforms/android/build.gradle > /tmp/build-info/root-build.gradle 2>/dev/null

      - name: Commit build info
        run: |
          if [ -d /tmp/build-info ]; then
            cp -r /tmp/build-info $GITHUB_WORKSPACE/
            cd $GITHUB_WORKSPACE
            git config user.name "CI Builder"
            git config user.email "ci@example.com"
            git add build-info/
            git commit -m "build info" || true
            git push origin HEAD:$GITHUB_REF_NAME 2>&1 || echo "push skipped"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/**/*.apk