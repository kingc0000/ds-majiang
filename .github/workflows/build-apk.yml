name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK env vars
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "=== Pre-installed build-tools ==="
          ls $SDK/build-tools/ 2>/dev/null
          echo "=== Pre-installed platforms ==="
          ls $SDK/platforms/ 2>/dev/null
          echo "=== Java ==="
          java -version 2>&1

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build
        working-directory: ./client/cordova
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "SDK=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null
          ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null
          ls platforms/android/app/ 2>/dev/null | head -3
          cordova build android --debug 2>&1

      - name: Copy APK
        if: success()
        working-directory: ./client/cordova
        run: |
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          [ -n "$APK" ] && cp "$APK" MajiangGame.apk && ls -la MajiangGame.apk || exit 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: ./client/cordova/MajiangGame.apk
          retention-days: 7