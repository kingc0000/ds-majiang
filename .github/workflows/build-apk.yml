name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          # 手动接受所有 SDK 许可证
          mkdir -p $SDK/licenses 2>/dev/null || true
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $SDK/licenses/android-sdk-license 2>/dev/null || true
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $SDK/licenses/android-sdk-license 2>/dev/null || true
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $SDK/licenses/android-sdk-license 2>/dev/null || true
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license 2>/dev/null || true
          echo "e9acab5b5fbb560a3d8bc6b24d8c7aec29f16f38" >> $SDK/licenses/android-sdk-preview-license 2>/dev/null || true
          # Cordova 7.x 需要从 SDK tools/templates 创建 Gradle Wrapper
          mkdir -p $SDK/tools/templates/gradle/wrapper
          # 下载 Gradle Wrapper jar
          curl -sLo $SDK/tools/templates/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/nicolas2025/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" 2>/dev/null || \
          curl -sLo $SDK/tools/templates/gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/nicklausw/gradle-wrapper-jar/master/gradle-wrapper.jar" 2>/dev/null || true
          # 创建 gradlew 脚本（不用 heredoc，YAML 缩进会破坏终止符）
          printf '#!/usr/bin/env sh\nGRADLE_OPTS=""\nDIRNAME=$(dirname "$0")\nexec java $GRADLE_OPTS -jar "$DIRNAME/gradle/wrapper/gradle-wrapper.jar" "$@"\n' > $SDK/tools/templates/gradle/wrapper/gradlew
          chmod +x $SDK/tools/templates/gradle/wrapper/gradlew
          # 创建 gradlew.bat
          printf '@if "%%%%DEBUG%%%%" == "" @echo off\n@rem Set local scope\nset DIRNAME=%%%%~dp0\n"%%%%JAVA_HOME%%%%/bin/java" %%%%GRADLE_OPTS%%%% -jar "%%%%DIRNAME%%%%/gradle/wrapper/gradle-wrapper.jar" %%%%*\n' > $SDK/tools/templates/gradle/wrapper/gradlew.bat
          # 创建 wrapper properties
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-6.7.1-all.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > $SDK/tools/templates/gradle/wrapper/gradle-wrapper.properties
          echo "Gradle template ready: $(ls $SDK/tools/templates/gradle/wrapper/)"

      - name: Install Cordova
        run: |
          npm install -g cordova@8.1.2
          # 旧版 cordova-android 7.x 需要这些旧模块
          npm install -g q properties-parser shelljs elementtree cordova-common xml2js nopt 2>&1 | tail -3
          echo "NODE_PATH=$(npm root -g)" >> $GITHUB_ENV

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          cordova build android --release 2>&1

      - name: Sign APK
        working-directory: ./client/cordova
        run: |
          # 查找编译好的 APK
          APK=$(find platforms/android -name "*.apk" -not -name "*unaligned*" 2>/dev/null | head -1)
          echo "APK path: $APK"
          
          # 从 secrets 读取签名密钥
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-key.keystore 2>/dev/null || true
          if [ -f release-key.keystore ]; then
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore release-key.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              "$APK" \
              "${{ secrets.KEY_ALIAS }}"

            # Zipalign 优化
            ${ANDROID_HOME}/build-tools/*/zipalign \
              -v 4 \
              "$APK" \
              MajiangGame.apk
          else
            # 未签名直接拷贝
            cp "$APK" MajiangGame.apk || echo "APK not found at: $APK"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: |
            ./client/cordova/MajiangGame.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./client/cordova/MajiangGame.apk
          generate_release_notes: true