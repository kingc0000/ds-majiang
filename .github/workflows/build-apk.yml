name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13

      - name: Build
        working-directory: ./client/cordova
        run: |
          exec 2>&1
          rm -rf platforms/android/ platforms/platforms.json
          echo "=== PLATFORM ADD ==="
          cordova platform add android@10
          echo "PLATFORM EXIT CODE: $?"
          ls -la platforms/android/gradlew 2>/dev/null && echo "gradlew EXISTS" || echo "NO gradlew"
          ls -la platforms/android/gradle/wrapper/ 2>/dev/null
          echo "=== FIX ==="
          sed -i 's|gradle-[0-9.]*-bin.zip|gradle-7.5.1-bin.zip|g' platforms/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null && echo "FIXED wrapper" || echo "NO wrapper"
          python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)" && echo "FIXED config" || echo "NO config"
          echo "=== DOWNLOAD WRAPPER ==="
          mkdir -p platforms/android/gradle/wrapper/
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradlew" -o platforms/android/gradlew && chmod +x platforms/android/gradlew && echo "gradlew OK" || echo "gradlew FAIL"
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradle/wrapper/gradle-wrapper.jar" -o platforms/android/gradle/wrapper/gradle-wrapper.jar && echo "wrapper jar OK" || echo "wrapper jar FAIL"
          echo "=== GRADLEW VERSION ==="
          cat platforms/android/gradle/wrapper/gradle-wrapper.properties
          echo "=== CDV-CONFIG ==="
          cat platforms/android/cdv-gradle-config.json
          echo "=== BUILD DIRECT ==="
          cd platforms/android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "BUILD EXIT CODE: $?"
          echo "=== APK ==="
          find . -type f -name "*.apk" 2>/dev/null
          find . -type d -name outputs 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            client/cordova/platforms/android/app/build/outputs/**/*.apk
            client/cordova/platforms/android/**/*.apk