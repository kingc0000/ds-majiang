name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
      - name: Install Cordova CLI
        run: npm install -g cordova@13
      - name: Platform add android@10
        working-directory: ./client/cordova
        run: rm -rf platforms && cordova platform add android@10
      - name: Set AGP 7.3.1 SDK 33
        working-directory: ./client/cordova
        run: python3 -c "import json;c=json.load(open('platforms/android/cdv-gradle-config.json'));c['SDK_VERSION']='33';c['MIN_BUILD_TOOLS_VERSION']='33.0.1';c['AGP_VERSION']='7.3.1';json.dump(c,open('platforms/android/cdv-gradle-config.json','w'),indent=4)"
      - name: Force Gradle clean + build with system tools
        working-directory: ./client/cordova/platforms/android
        run: |
          set +e
          echo "=== Java ==="
          java -version 2>&1
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          ls $ANDROID_HOME/platforms/ 2>/dev/null
          echo "=== System Gradle ==="
          which gradle 2>/dev/null || echo "No system gradle"
          gradle --version 2>&1 || echo "gradle not available"
          echo "=== Make gradlew executable ==="
          chmod +x gradlew 2>/dev/null
          echo "=== gradlew --version ==="
          ./gradlew --version 2>&1 | head -10
          echo "=== Clean ==="
          ./gradlew clean --no-daemon 2>&1
          echo "=== assembleDebug ==="
          ./gradlew assembleDebug --no-daemon 2>&1
          BUILD_EXIT=$?
          echo "BUILD_EXIT=$BUILD_EXIT"
          echo "=== APK search ==="
          find / -name "*.apk" -type f 2>/dev/null | head -10
          find . -name "*.apk" -type f 2>/dev/null
          exit $BUILD_EXIT
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: |
            **/*.apk
            app/build/outputs/**/*.apk
            /home/runner/work/**/*.apk