name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Install Cordova
        run: npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          set +e
          echo "=== CLEAN ==="
          rm -rf platforms/android/
          rm -f platforms/platforms.json
          echo "=== ADD PLATFORM ==="
          cordova platform add android@10 2>&1
          echo "=== PLATFORM EXIT: $? ==="
          echo "=== BUILD ==="
          cordova build android --debug 2>&1
          echo "=== BUILD EXIT: $? ==="
          echo "=== OUTPUTS ==="
          find platforms/android/app/build -type f 2>&1 || echo "no build dir"
          find . -name "*.apk" 2>&1 || echo "no apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ds-majiang-apk
          path: client/cordova/platforms/android/app/build/outputs/apk/**/*.apk