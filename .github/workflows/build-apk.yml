name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: |
          npm install -g cordova@8.1.2

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          cordova platform add android --nofetch 2>/dev/null || true
          cordova build android --release

      - name: Sign APK
        working-directory: ./client/cordova
        run: |
          # 从 secrets 读取签名密钥
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-key.keystore 2>/dev/null || true
          if [ -f release-key.keystore ]; then
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore release-key.keystore \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
              "${{ secrets.KEY_ALIAS }}"

            # Zipalign 优化
            ${ANDROID_HOME}/build-tools/*/zipalign \
              -v 4 \
              platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
              MajiangGame.apk
          else
            # 未签名也可以安装测试
            cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk MajiangGame.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: |
            ./client/cordova/MajiangGame.apk
            ./client/cordova/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./client/cordova/MajiangGame.apk
          generate_release_notes: true