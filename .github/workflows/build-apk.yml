name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;30.0.3" \
            "platforms;android-30" \
            --sdk_root=$SDK 2>&1 || true

      - name: Install Cordova
        run: |
          npm install -g cordova@13 2>&1

      - name: Build APK
        working-directory: ./client/cordova
        run: |
          echo "=== Java ==="
          java -version 2>&1
          echo "=== SDK ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null
          echo "=== Build ==="
          cordova build android --debug 2>&1
          echo "=== EXIT CODE: $? ==="

      - name: Find and copy APK
        working-directory: ./client/cordova
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" MajiangGame.apk
            ls -la MajiangGame.apk
            echo "APK copied successfully"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: ./client/cordova/MajiangGame.apk
          retention-days: 7