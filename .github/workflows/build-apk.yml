name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        run: |
          SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;30.0.3" \
            "platforms;android-30" \
            --sdk_root=$SDK 2>&1

      - name: Install Cordova & Build
        working-directory: ./client/cordova
        run: |
          set -x
          npm install -g cordova@13 2>&1
          echo "--- Removing problematic build.json ---"
          rm -f build.json
          echo "--- Adding android platform ---"
          cordova platform add android@10 2>&1
          echo "--- Building ---"
          cordova build android --debug 2>&1
          echo "--- Finding APK ---"
          find . -name "*.apk" 2>/dev/null
          find . -name "*.apk" 2>/dev/null | head -1 | xargs -I{} cp {} MajiangGame.apk 2>/dev/null || true
          ls -la MajiangGame.apk 2>/dev/null || echo "No APK found"

      - name: Upload APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: majiang-game-apk
          path: ./client/cordova/MajiangGame.apk
          retention-days: 7